<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
        <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3KG3SZL4EF"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-3KG3SZL4EF');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{url_for('static', filename='icons/icon_144x144.png')}}" type="image/png">
    <link rel="icon" href="{{url_for('static', filename='icons/icon_192x192.png')}}" type="image/png">
    <link rel="icon" href="{{url_for('static', filename='icons/icon_512x512.png')}}" type="image/png">
    <link rel="apple-touch-icon" href="{{url_for('static', filename='icons/icon_144x144.png')}}" type="image/png">
    <link rel="apple-touch-icon" href="{{url_for('static', filename='icons/icon_192x192.png')}}" type="image/png">
    <link rel="apple-touch-icon" href="{{url_for('static', filename='icons/icon_512x512.png')}}" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>

        if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register("/sw.js").then(function(registration) {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, function(err) {
            console.log('ServiceWorker registration failed: ', err);
            });
        });
        }

    </script>
    <title>{{ title }}</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Map 1</a></li>
            <li><a href="{{ url_for('map2') }}" class="{% if request.endpoint == 'map2' %}active{% endif %}">Map 2</a></li>
            <li><a href="{{ url_for('book1') }}" class="{% if request.endpoint == 'book1' %}active{% endif %}">Book 1</a></li>
            <li><a href="{{ url_for('book2') }}" class="{% if request.endpoint == 'book2' %}active{% endif %}">Book 2</a></li>
            <li><a href="{{ url_for('add') }}" class="{% if request.endpoint == 'add' %}active{% endif %}">Add</a></li>
        </ul>
    </nav>
    <div class="map-container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        <div class="footer-content">
            <p>&copy; 2024, My Travel Map.</p>
            <div class="promo-badges">
                <a href="https://apps.apple.com/us/app/my-player-compare-basketball/id6767770190" target="_blank" class="badge-button">
                    <i class="fab fa-apple badge-icon"></i>
                    <div class="badge-text">
                        <span class="badge-sub">Download on the</span>
                        <span class="badge-main">App Store</span>
                    </div>
                </a>
                <a href="https://play.google.com/store/search?q=my%20players%20compare&c=apps" target="_blank" class="badge-button">
                    <i class="fab fa-google-play badge-icon"></i>
                    <div class="badge-text">
                        <span class="badge-sub">GET IT ON</span>
                        <span class="badge-main">Google Play</span>
                    </div>
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
